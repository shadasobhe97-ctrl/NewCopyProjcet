name: kids_transport
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # 1. إدارة الحالة (State Management)
  flutter_bloc: ^9.1.1

  # 2. حقن الاعتماديات
  get_it: ^7.6.0

  # 3. الاتصال بالسيرفر والـ API (Network)
  dio: ^5.4.0

  # 4. التصميم المتجاوب والمقاسات (UI Responsive)
  flutter_screenutil: ^5.9.3

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  pin_code_fields: ^8.0.1
  flutter_localizations:
    sdk: flutter
  image_picker: ^1.2.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  intl: ^0.20.2
  convex_bottom_bar: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # أصول الصور (Assets) منسقة بمسافتين تحت flutter
  assets:
    - assets/images/

  # الخطوط (Fonts) منسقة بمسافتين تحت flutter
  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
